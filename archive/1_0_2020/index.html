<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="Personal Homepage for Luke Liukonen">
  <meta name="author" content="Luke Liukonen">
  <title>Luke Liukonen</title>
  <link href="./css/index.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../share/css/bootstrap/4.5.0/bootstrap.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ==" crossorigin="anonymous" />
  <link rel="apple-touch-icon" href="../share/img/v1/favicons/apple-touch-icon.png" sizes="180x180">
  <link rel="icon" href="../share/img/v1/favicons/favicon-32x32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="../share/img/v1/favicons/favicon-16x16.png" sizes="16x16" type="image/png">
  <link rel="manifest" href="../share/img/v1/favicons/manifest.json">
  <link rel="mask-icon" href="../share/img/v1/favicons/safari-pinned-tab.svg" color="#ffffff">
  <link rel="icon" href="../share/img/v1/favicons/favicon.ico">
  <meta name="msapplication-config" content="../share/img/v1/favicons/browserconfig.xml">
  <meta name="theme-color" content="#ffffff">
</head>

<body>

  <nav class="navbar transparent navbar-expand-md navbar-dark fixed-top">
    <a class="navbar-brand" href="index.html" aria-label="welcome"><img src="../share/img/v1/favicons/favicon-32x32.png"
        class="invert" alt="logo" /></a>
    <ul class="navbar-nav" id="navItem">
      <li v-for="navItem in this.MenuItems" v-bind:class="validatePath(navItem.value)">
        <a class="nav-link" v-bind:href="navItem.value">{{navItem.name}}</a>
      </li>
    </ul>
  </nav>
  <main>
    <div class="jumbotron">
      <div class="container text-light">
        <h1 class="display-3">
          <img src="../share/img/me-bw.webp" class="rounded-circle user_img" alt="Luke Liukonen" /> Hello, world!
        </h1>
        <div class="d-none d-sm-block">
          <p>Developer / Former Instructor / Tech enthusiast</p>
          <p>Welcome to my personal page.</p>
        </div>
        <a target="_blank" class="btn btn-secondary" href="https://github.com/liukonen" role="button"
          aria-label="Github"><i class="fab fa-github-alt"></i> <b class="d-none d-sm-inline">GitHub</b></a>
        <a target="_blank" class="btn btn-info" href="https://www.linkedin.com/in/lukeliukonen/" role="button"
          aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i><b class="d-none d-sm-inline"> LinkedIn</b></a>
        <a class="btn btn-danger" href="mailto:liukonen@gmail.com?subject=GitHub_Home_Page" role="button"
          aria-label="email"><i class="far fa-envelope"></i><b class="d-none d-sm-inline"> email</b></a>
      </div>
    </div>
    <div class="container" id="mainContainer">
      <h2 class="h3 bold">Open Source Projects</h2>
      <hr class="featurette-divider">
      <div id="app">
        <div class="row row-cols-1 row-cols-md-3">
          <div v-for="product in this.Products">
            <div class="col mb-4 hoverItem">
              <div class="card shadow">
                <div class="">
                  <img :src="GetImage(product.image)" style="height:250px;" class="card-img-top himg"
                    v-bind:alt="product.Title" />
                </div>
                <div class="card-body">
                  <h5 class="card-title">{{product.Title}}</h5>
                  <p class="card-text">{{product.SubTitle}}<button class="btn btn-link text-dark"
                      onclick="ExpandText(this)">[+]</button></p>
                  <div class="content">
                    {{product.Description}}
                  </div>
                  <p><a v-for="button in product.buttons" v-bind:class="DetermButtonColor(button.type)"
                      v-bind:href="button.url" target="_blank">{{button.type}}</a></p>
                  <p>Learnings<button class="btn btn-link text-dark" onclick="ExpandText(this)">[+]</button> </p>
                  <div class="content">
                    <span v-for="tag in product.tags" class="badge badge-light font-weight-lighter">{{tag}}</span></p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div>
  </main>
  <footer class="container">
    <p>© Luke Liukonen 2020</p>
  </footer>
  <script
  src="https://code.jquery.com/jquery-3.7.1.min.js"
  integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
  crossorigin="anonymous"></script>
  <!-- <script src="../share/js/jquery/3.5.1/jquery.min.js" crossorigin="anonymous"></script> -->
  <script src="../share/js/bootstrap/4.5.1/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="../share//js/misc/vue.2.6.111.js"></script>
  <script src="https://unpkg.com/vue-lazyload/vue-lazyload.js"></script>
  <script src="./js/base.js"></script>
  <script src="./js/index.vue.js"></script>
</body>
</html>
